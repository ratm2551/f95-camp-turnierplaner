<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#d31920" />
<title>Turnier verwalten | Camp-Turnier</title>
<link rel="manifest" href="manifest.json" />
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>
<div class="app">
  <header class="topbar">
    <div style="flex:1">
      <h1 id="turnierTitel">Turnier</h1>
      <div class="sub" id="turnierSub">Code: –</div>
    </div>
    <button class="btn btn-secondary" id="btnShare" style="width:auto;padding:8px 12px;font-size:13px">Live-Link</button>
  </header>

  <main>
    <div class="tabs">
      <button class="tab-btn active" data-tab="spielplan">Spielplan</button>
      <button class="tab-btn" data-tab="tabelle">Tabelle</button>
      <button class="tab-btn" data-tab="ko">K.O.-Runde</button>
    </div>

    <div id="tab-spielplan"></div>
    <div id="tab-tabelle" style="display:none"></div>
    <div id="tab-ko" style="display:none"></div>
  </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="js/firebase-sync.js"></script>
<script src="js/tournament-engine.js"></script>
<script src="js/manage.js"></script>
<script>if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");</script>
</body>
</html>
